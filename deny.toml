[graph]
targets = [
  "aarch64-pc-windows-msvc",
  "aarch64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
]
all-features = true

[bans]
# Exact duplicate names and versions are checked against expiring metadata in
# release-policy.json. cargo-deny still owns wildcard and banned-crate policy.
multiple-versions = "allow"
wildcards = "deny"
deny = [
  { crate = "serde_yml", use-instead = "serde_yaml_ng", reason = "serde_yml was removed after unsound libyml advisories" },
  { crate = "libyml", reason = "The libyml bindings used by serde_yml are unsound" },
  { crate = "native-tls", use-instead = "rustls", reason = "Avoid an undeclared native OpenSSL runtime surface" },
  { crate = "openssl", use-instead = "rustls", reason = "Avoid an undeclared native OpenSSL runtime surface" },
  { crate = "openssl-sys", use-instead = "rustls", reason = "Avoid an undeclared native OpenSSL runtime surface" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "deny"
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
